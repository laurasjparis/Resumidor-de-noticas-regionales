services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: noticias
      POSTGRES_PASSWORD: noticias123
      POSTGRES_DB: noticias_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noticias -d noticias_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://noticias:noticias123@db:5432/noticias_db
      APP_ENV: development
      LOG_LEVEL: INFO
      HTTP_TIMEOUT: 10
      MAX_NOTICIAS_PER_PAGE: 50
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_USE_MOCK: "false"
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
