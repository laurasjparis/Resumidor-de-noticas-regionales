services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      POSTGRES_USER: noticias
      POSTGRES_PASSWORD: noticias123
      POSTGRES_DB: noticias_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noticias -d noticias_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://noticias:noticias123@db:5432/noticias_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
