services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noticias}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noticias123}
      POSTGRES_DB: ${POSTGRES_DB:-noticias_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noticias}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-noticias}:${POSTGRES_PASSWORD:-noticias123}@db:5432/${POSTGRES_DB:-noticias_db}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-10}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
